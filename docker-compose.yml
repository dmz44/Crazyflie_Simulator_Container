version: '3.8'

services:
  crazysim:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: remote_pc_humble
    
    network_mode: "host"
    ipc: "host"
    privileged: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - HOST_UID=${HOST_UID:-1000}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${USER_HOME:-~}/crazyflie_docker/my_code:/root/my_code

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, graphics, utility]

    command: tail -f /dev/null
